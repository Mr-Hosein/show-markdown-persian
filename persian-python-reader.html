<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ترجمه عامیانه — دفترچه پایتون</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #171B24;
    --bg-raised: #1E2330;
    --paper-line: #262C3B;
    --ink: #EAE6DB;
    --ink-dim: #A9A79C;
    --amber: #D9A544;
    --amber-dim: #8A6E37;
    --jade: #7FB69E;
    --code-bg: #0F1219;
    --code-ink: #9FD8B0;
    --rule: #2C3242;
    --sidebar-w: 300px;
    --content-w: 700px;
  }

  *{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 900px 500px at 85% -10%, rgba(217,165,68,0.07), transparent 60%),
      repeating-linear-gradient(180deg, transparent 0, transparent 47px, var(--paper-line) 48px);
    color: var(--ink);
    font-family: 'Vazirmatn', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- progress bar ---------- */
  #progress{
    position: fixed; top:0; right:0; left:0; height:3px; z-index:60;
    background: transparent;
  }
  #progress-fill{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--amber), var(--jade));
    transition: width .1s linear;
  }

  /* ---------- layout ---------- */
  .layout{
    display:flex;
    max-width: 1180px;
    margin: 0 auto;
    align-items: flex-start;
    min-height:100vh;
  }

  aside{
    width: var(--sidebar-w);
    flex: 0 0 var(--sidebar-w);
    position: sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    padding: 34px 26px 34px 14px;
    border-left: 1px solid var(--rule);
    scrollbar-width: thin;
    scrollbar-color: var(--amber-dim) transparent;
  }
  aside::-webkit-scrollbar{ width:6px; }
  aside::-webkit-scrollbar-thumb{ background: var(--amber-dim); border-radius: 4px; }

  .brand{
    margin-bottom: 28px;
  }
  .brand .kicker{
    display:block;
    font-size: 12px;
    letter-spacing: .08em;
    color: var(--jade);
    margin-bottom: 6px;
  }
  .brand h1{
    font-size: 21px;
    font-weight: 700;
    margin: 0 0 4px;
    line-height:1.5;
    color: var(--ink);
  }
  .brand p{
    font-size: 12.5px;
    color: var(--ink-dim);
    margin: 0;
    line-height: 1.7;
  }

  .file-open{
    display:inline-block;
    margin-top: 14px;
    font-size: 12px;
    color: var(--amber);
    border: 1px dashed var(--amber-dim);
    padding: 7px 12px;
    border-radius: 7px;
    cursor:pointer;
    transition: background .15s ease, color .15s ease;
  }
  .file-open:hover{ background: rgba(217,165,68,0.1); }

  nav.toc{ list-style:none; margin:0; padding:0; }
  nav.toc a{
    display:flex;
    align-items: baseline;
    gap:10px;
    text-decoration:none;
    color: var(--ink-dim);
    font-size: 13.5px;
    padding: 7px 8px;
    border-radius: 6px;
    line-height:1.5;
    transition: color .15s ease, background .15s ease, transform .15s ease;
  }
  nav.toc a:hover{ color: var(--ink); background: rgba(217,165,68,0.08); }
  nav.toc a.active{
    color: var(--amber);
    background: rgba(217,165,68,0.1);
  }
  nav.toc a.active .ord{ background: var(--amber); color: #171B24; }
  nav.toc .ord{
    flex: 0 0 auto;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--amber-dim);
    background: rgba(217,165,68,0.12);
    border-radius: 50%;
    width: 22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    transition: background .15s ease, color .15s ease;
  }

  main{
    flex: 1 1 auto;
    min-width: 0;
    padding: 56px 48px 120px;
    display:flex;
    justify-content:center;
  }

  article{
    max-width: var(--content-w);
    width:100%;
  }

  .doc-title{
    font-size: 30px;
    font-weight: 900;
    color: var(--ink);
    margin: 0 0 6px;
    line-height:1.4;
  }
  .doc-sub{
    color: var(--ink-dim);
    font-size:14px;
    margin: 0 0 44px;
    padding-bottom: 30px;
    border-bottom: 1px dashed var(--rule);
  }

  article h2{
    font-size: 22px;
    font-weight: 700;
    color: var(--amber);
    margin: 64px 0 20px;
    padding-inline-start: 16px;
    border-inline-start: 3px solid var(--amber);
    line-height:1.6;
  }
  article h2:first-of-type{ margin-top:0; }

  article h1, article h3, article h4, article h5, article h6{
    color: var(--ink);
    font-weight: 700;
    line-height:1.6;
    margin: 40px 0 16px;
  }
  article h1{ font-size: 26px; color: var(--amber); }
  article h3{ font-size: 18px; }
  article h4{ font-size: 16.5px; color: var(--jade); }
  article h5, article h6{ font-size: 15px; color: var(--ink-dim); }

  article ul, article ol{
    margin: 0 0 20px;
    padding-inline-start: 28px;
    color: var(--ink);
  }
  article li{
    font-size: 16.5px;
    line-height: 1.95;
    margin-bottom: 8px;
  }
  article ul > li::marker{ color: var(--amber); }
  article ol > li::marker{ color: var(--amber); font-weight:700; }
  article li ul, article li ol{ margin-top: 8px; margin-bottom: 0; }
  article li p{ margin: 0 0 8px; }

  article blockquote{
    margin: 0 0 22px;
    padding: 4px 20px;
    border-inline-start: 3px solid var(--jade);
    color: var(--ink-dim);
    background: rgba(127,182,158,0.06);
    border-radius: 0 8px 8px 0;
  }
  article blockquote p{ margin-bottom: 10px; }
  article blockquote p:last-child{ margin-bottom: 4px; }

  article a{
    color: var(--jade);
    text-decoration: underline;
    text-decoration-color: rgba(127,182,158,0.4);
    text-underline-offset: 3px;
  }
  article a:hover{ text-decoration-color: var(--jade); }

  article img{
    max-width: 100%;
    border-radius: 10px;
    border: 1px solid var(--rule);
    margin: 10px 0 24px;
    display:block;
  }

  article em{ color: var(--ink); font-style: italic; }
  article del{ color: var(--ink-dim); }

  article table{
    width:100%;
    border-collapse: collapse;
    margin: 6px 0 26px;
    font-size: 14.5px;
  }
  article th, article td{
    border: 1px solid var(--rule);
    padding: 9px 12px;
    text-align: start;
  }
  article th{
    background: var(--bg-raised);
    color: var(--amber);
    font-weight: 700;
  }
  article tr:nth-child(even) td{ background: rgba(255,255,255,0.02); }

  article p{
    font-size: 16.5px;
    line-height: 2.05;
    color: var(--ink);
    margin: 0 0 20px;
  }

  article strong{ color: var(--amber); font-weight:700; }

  article hr{
    border:none;
    text-align:center;
    margin: 46px 0;
  }
  article hr::before{
    content: "···";
    color: var(--amber-dim);
    letter-spacing: 10px;
    font-size:18px;
  }

  /* inline code */
  article :not(pre) > code{
    direction: ltr;
    unicode-bidi: isolate;
    font-family: 'Fira Code', monospace;
    font-size: 13.5px;
    background: rgba(159,216,176,0.08);
    color: var(--jade);
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid rgba(159,216,176,0.18);
  }

  /* code blocks */
  article pre{
    direction: ltr;
    text-align: left;
    background: var(--code-bg);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 18px 20px;
    overflow-x:auto;
    margin: 6px 0 26px;
    position:relative;
  }
  article pre::before{
    content: "code";
    position:absolute;
    top:8px; right:14px;
    font-family:'Fira Code',monospace;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color: var(--ink-dim);
    opacity:.55;
  }
  article pre code{
    font-family: 'Fira Code', monospace;
    font-size: 13.5px;
    line-height:1.8;
    color: var(--code-ink);
    background: none;
    border:none;
    padding:0;
  }

  /* ---------- mobile ---------- */
  #toc-toggle{
    display:none;
    position: fixed;
    z-index: 70;
    bottom: 22px;
    left: 22px;
    background: var(--amber);
    color:#171B24;
    border:none;
    width:48px; height:48px;
    border-radius: 50%;
    font-size:18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  }

  @media (max-width: 900px){
    aside{
      position: fixed;
      right: 0;
      top:0;
      z-index: 65;
      width: 82vw;
      max-width: 320px;
      background: var(--bg-raised);
      transform: translateX(100%);
      transition: transform .25s ease;
      box-shadow: -10px 0 30px rgba(0,0,0,0.4);
    }
    aside.open{ transform: translateX(0); }
    main{ padding: 44px 22px 100px; }
    article h2{ font-size:19px; margin-top:48px; }
    .doc-title{ font-size:24px; }
    #toc-toggle{ display:block; }
  }
</style>
</head>
<body>

<div id="progress"><div id="progress-fill"></div></div>

<button id="toc-toggle" aria-label="فهرست">☰</button>

<div class="layout">
  <aside id="sidebar">
    <div class="brand">
      <span class="kicker">دفترچه یادداشت</span>
      <h1>ترجمه عامیانه پایتون</h1>
      <p>مسیر خواندنی مفاهیم تکرار، حلقه‌ها، توابع و مستندسازی — بدون حذف چیزی.</p>
      <label class="file-open" for="file-input">باز کردن فایل دیگر…</label>
      <input type="file" id="file-input" accept=".md,.markdown,text/markdown,text/plain" hidden>
    </div>
    <nav class="toc" id="toc"></nav>
  </aside>

  <main>
    <article id="content">
      <p style="color:var(--ink-dim)">در حال آماده‌سازی متن…</p>
    </article>
  </main>
</div>

function b64ToUtf8(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

const contentEl = document.getElementById('content');
const tocEl = document.getElementById('toc');
let observer = null;

/* ---------- small, dependency-free markdown renderer ---------- *
 * Supports: headings (# .. ######), fenced code blocks, hr,
 * blockquotes, ordered/unordered lists (with one level of
 * nesting), tables, paragraphs, and inline bold/italic/
 * strikethrough/code/links/images. No network, no external libs —
 * not full CommonMark, but covers the vast majority of everyday
 * markdown files.                                                */
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inlineFormat(s){
  s = escapeHtml(s);

  // protect inline code from further inline processing
  const codeStore = [];
  s = s.replace(/`([^`]+)`/g, (_, code) => {
    codeStore.push(code);
    return `\u0000C${codeStore.length - 1}\u0000`;
  });

  // images ![alt](src)
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g,
    (_, alt, url) => `<img alt="${alt}" src="${url}" loading="lazy">`);

  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g,
    (_, text, url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`);

  // bold
  s = s.replace(/\*\*([^*]+)\*\*/g, (_, b) => `<strong>${b}</strong>`);
  s = s.replace(/__([^_]+)__/g, (_, b) => `<strong>${b}</strong>`);

  // strikethrough
  s = s.replace(/~~([^~]+)~~/g, (_, t) => `<del>${t}</del>`);

  // italic (single * or _, not already consumed by bold above)
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, (_, pre, t) => `${pre}<em>${t}</em>`);
  s = s.replace(/(^|[^_\w])_([^_\n]+)_(?!_)/g, (_, pre, t) => `${pre}<em>${t}</em>`);

  // restore code spans
  s = s.replace(/\u0000C(\d+)\u0000/g, (_, idx) => `<code>${codeStore[Number(idx)]}</code>`);

  return s;
}

function splitTableRow(line){
  let l = line.trim();
  if(l.startsWith('|')) l = l.slice(1);
  if(l.endsWith('|')) l = l.slice(0, -1);
  return l.split('|');
}

function isTableSeparator(line){
  return /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(line);
}

function isBlockStart(line){
  if(/^\s*(```|~~~)/.test(line)) return true;
  if(/^\s*([-*_])\s*(\1\s*){2,}$/.test(line)) return true;
  if(/^\s{0,3}#{1,6}\s+/.test(line)) return true;
  if(/^\s*>/.test(line)) return true;
  if(/^\s*([-*+])\s+/.test(line)) return true;
  if(/^\s*\d+[.)]\s+/.test(line)) return true;
  return false;
}

function parseList(lines, start){
  const firstMatch = lines[start].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
  const baseIndent = firstMatch[1].length;
  const ordered = /\d/.test(firstMatch[2]);
  const items = [];
  let i = start;

  while(i < lines.length){
    const line = lines[i];
    const im = line.match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
    if(im && im[1].length === baseIndent && (/\d/.test(im[2]) === ordered)){
      const itemLines = [im[3]];
      i++;
      while(i < lines.length){
        const l = lines[i];
        if(l.trim() === ''){
          const nextLine = lines[i + 1];
          if(nextLine && (/^\s{2,}\S/.test(nextLine) || /^\s*([-*+]|\d+[.)])\s+/.test(nextLine))){
            itemLines.push('');
            i++;
            continue;
          }
          break;
        }
        const contIndent = l.match(/^(\s*)/)[1].length;
        if(contIndent > baseIndent){
          itemLines.push(l.slice(Math.min(baseIndent + 2, l.length)));
          i++;
        } else break;
      }
      items.push(itemLines.join('\n'));
    } else break;
  }

  let html = ordered ? '<ol>' : '<ul>';
  items.forEach(itemText => {
    const hasNested = itemText.split('\n').some(l => /^\s*([-*+]|\d+[.)])\s+/.test(l));
    if(hasNested){
      html += `<li>${mdToHtml(itemText)}</li>`;
    } else {
      html += `<li>${inlineFormat(itemText.split('\n').map(l => l.trim()).join(' ').trim())}</li>`;
    }
  });
  html += ordered ? '</ol>\n' : '</ul>\n';
  return { html, next: i };
}

function mdToHtml(mdText){
  const lines = mdText.split('\n');
  const n = lines.length;
  let html = '';
  let i = 0;

  while(i < n){
    const line = lines[i];

    if(line.trim() === ''){ i++; continue; }

    // fenced code block
    const fence = line.match(/^\s*(```|~~~)(.*)$/);
    if(fence){
      const fenceMark = fence[1];
      const lang = fence[2].trim();
      i++;
      const buf = [];
      while(i < n && !lines[i].trim().startsWith(fenceMark)){ buf.push(lines[i]); i++; }
      i++; // skip closing fence
      const langAttr = lang ? ` class="lang-${escapeHtml(lang)}"` : '';
      html += `<pre><code${langAttr}>${escapeHtml(buf.join('\n'))}</code></pre>\n`;
      continue;
    }

    // horizontal rule
    if(/^\s*([-*_])\s*(\1\s*){2,}$/.test(line)){
      html += '<hr>\n'; i++; continue;
    }

    // heading
    const hMatch = line.match(/^\s{0,3}(#{1,6})\s+(.*)$/);
    if(hMatch){
      const level = hMatch[1].length;
      html += `<h${level}>${inlineFormat(hMatch[2].trim())}</h${level}>\n`;
      i++; continue;
    }

    // blockquote
    if(/^\s*>/.test(line)){
      const buf = [];
      while(i < n && /^\s*>/.test(lines[i])){
        buf.push(lines[i].replace(/^\s*>\s?/, ''));
        i++;
      }
      html += `<blockquote>${mdToHtml(buf.join('\n'))}</blockquote>\n`;
      continue;
    }

    // table
    if(line.includes('|') && i + 1 < n && isTableSeparator(lines[i + 1])){
      const headerCells = splitTableRow(line);
      const aligns = splitTableRow(lines[i + 1]).map(c => {
        const t = c.trim();
        if(/^:-+:$/.test(t)) return 'center';
        if(/^-+:$/.test(t)) return 'right';
        if(/^:-+$/.test(t)) return 'left';
        return '';
      });
      i += 2;
      const bodyRows = [];
      while(i < n && lines[i].includes('|') && lines[i].trim() !== ''){
        bodyRows.push(splitTableRow(lines[i]));
        i++;
      }
      html += '<table><thead><tr>' +
        headerCells.map((c, idx) => `<th${aligns[idx] ? ` style="text-align:${aligns[idx]}"` : ''}>${inlineFormat(c.trim())}</th>`).join('') +
        '</tr></thead><tbody>';
      bodyRows.forEach(r => {
        html += '<tr>' + r.map((c, idx) => `<td${aligns[idx] ? ` style="text-align:${aligns[idx]}"` : ''}>${inlineFormat((c || '').trim())}</td>`).join('') + '</tr>';
      });
      html += '</tbody></table>\n';
      continue;
    }

    // list
    if(/^\s*([-*+])\s+/.test(line) || /^\s*\d+[.)]\s+/.test(line)){
      const { html: listHtml, next } = parseList(lines, i);
      html += listHtml;
      i = next;
      continue;
    }

    // paragraph — gather until blank line or a new block starts
    const buf = [line.trim()];
    i++;
    while(i < n && lines[i].trim() !== '' && !isBlockStart(lines[i])){
      buf.push(lines[i].trim());
      i++;
    }
    html += `<p>${inlineFormat(buf.join(' '))}</p>\n`;
  }

  return html;
}

function renderMarkdown(raw){
  // split off the very first H1 as the doc title, rest goes into article
  const lines = raw.split('\n');
  let titleLine = '';
  let bodyLines = [];
  let usedTitle = false;
  for(const line of lines){
    if(!usedTitle && line.startsWith('# ')){
      titleLine = line.replace(/^#\s+/, '');
      usedTitle = true;
      continue;
    }
    bodyLines.push(line);
  }
  const bodyMd = bodyLines.join('\n');

  contentEl.innerHTML = '';
  const titleWrap = document.createElement('div');
  titleWrap.innerHTML = `<h1 class="doc-title">${escapeHtml(titleLine || 'سند بدون عنوان')}</h1><p class="doc-sub">راهنمای گام‌به‌گام، به زبان محاوره‌ای فارسی</p>`;
  contentEl.appendChild(titleWrap);

  const renderedWrap = document.createElement('div');
  renderedWrap.innerHTML = mdToHtml(bodyMd);
  contentEl.appendChild(renderedWrap);

  // Persian ordinal-ish markers for the TOC (falls back to plain numbers past 20)
  const ordWords = ["۱","۲","۳","۴","۵","۶","۷","۸","۹","۱۰","۱۱","۱۲","۱۳","۱۴","۱۵","۱۶","۱۷","۱۸","۱۹","۲۰"];

  tocEl.innerHTML = '';
  let headings = Array.from(renderedWrap.querySelectorAll('h2'));
  if(headings.length === 0) headings = Array.from(renderedWrap.querySelectorAll('h1, h3'));
  headings.forEach((h,i)=>{
    const id = 'part-' + (i+1);
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    const label = h.textContent.replace(/^قسمت[^:：]*[:：]\s*/,'');
    a.innerHTML = `<span class="ord">${ordWords[i] || (i+1)}</span><span>${label}</span>`;
    tocEl.appendChild(a);
  });

  if(observer) observer.disconnect();
  const tocLinks = Array.from(tocEl.querySelectorAll('a'));
  observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const id = entry.target.id;
      const link = tocLinks.find(l => l.getAttribute('href') === '#' + id);
      if(!link) return;
      if(entry.isIntersecting){
        tocLinks.forEach(l=>l.classList.remove('active'));
        link.classList.add('active');
      }
    });
  },{ rootMargin: '-15% 0px -70% 0px' });
  headings.forEach(h=>observer.observe(h));
}

renderMarkdown(b64ToUtf8(MD_B64));

// let the user open a different .md file from their own computer
document.getElementById('file-input').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    renderMarkdown(reader.result);
    window.scrollTo({top:0});
  };
  reader.readAsText(file, 'utf-8');
});

// reading progress
const fill = document.getElementById('progress-fill');
window.addEventListener('scroll', ()=>{
  const h = document.documentElement;
  const scrolled = h.scrollTop;
  const height = h.scrollHeight - h.clientHeight;
  fill.style.width = (height>0 ? (scrolled/height*100) : 0) + '%';
});

// mobile toc toggle
const sidebar = document.getElementById('sidebar');
const toggle = document.getElementById('toc-toggle');
toggle.addEventListener('click', ()=> sidebar.classList.toggle('open'));
tocEl.addEventListener('click', (e)=>{
  if(e.target.closest('a')) sidebar.classList.remove('open');
});
</script>
